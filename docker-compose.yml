version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - 80
    environment:
      - APP_NAME=${APP_NAME:-Laravel}
      - APP_ENV=${APP_ENV:-production}
      - APP_KEY=${APP_KEY}
      - APP_DEBUG=${APP_DEBUG:-false}
      - APP_URL=${APP_URL:-http://localhost}
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-laravel_db}
      - DB_USERNAME=${DB_USERNAME:-laravel_user}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
    volumes:
      # Mount storage agar file upload tidak hilang ketika container di-restart
      - app-storage:/var/www/html/storage/app/public
    depends_on:
      db:
        condition: service_healthy
    networks:
      - coolify

  db:
    image: mariadb:10.4
    restart: unless-stopped
    environment:
      - MYSQL_DATABASE=${DB_DATABASE:-laravel_db}
      - MYSQL_USER=${DB_USERNAME:-laravel_user}
      - MYSQL_PASSWORD=${DB_PASSWORD:-invsandi123}
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD:-invsandi123}
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - coolify
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1"]
      interval: 5s
      timeout: 5s
      retries: 10

networks:
  coolify:

volumes:
  app-storage:
  db-data:
